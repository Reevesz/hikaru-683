<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <head>
  <title>Login</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at top, #0a0f0a, #000000 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #d4ffd4;
    }

    .login-box {
      width: 350px;
      padding: 40px;
      background: rgba(0, 0, 0, 0.85);
      border-radius: 15px;
      border: 1px solid rgba(0, 255, 100, 0.2);
      box-shadow: 
        0 0 20px rgba(0, 255, 100, 0.15),
        inset 0 0 10px rgba(0, 255, 100, 0.05);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .login-box h2 {
      margin-bottom: 25px;
      color: #00ff88;
      font-weight: 600;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(0,255,136,0.6);
    }

    .input-group {
      position: relative;
      margin-bottom: 25px;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid rgba(0,255,136,0.2);
      border-radius: 8px;
      outline: none;
      color: #d4ffd4;
      transition: 0.3s;
    }

    .input-group input:focus {
      border-color: #00ff88;
      box-shadow: 0 0 10px rgba(0,255,136,0.5);
    }

    .input-group label {
      position: absolute;
      top: 50%;
      left: 12px;
      transform: translateY(-50%);
      color: #6affb0;
      font-size: 14px;
      pointer-events: none;
      transition: 0.3s;
      background: #000;
      padding: 0 5px;
    }

    .input-group input:focus + label,
    .input-group input:valid + label {
      top: -8px;
      font-size: 11px;
      color: #00ff88;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #00ff88, #00cc66);
      color: black;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 15px rgba(0,255,136,0.4);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(0,255,136,0.8);
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #4d7f63;
    }

    /* subtle animated glow */
    @keyframes glow {
      0% { box-shadow: 0 0 10px rgba(0,255,136,0.2); }
      50% { box-shadow: 0 0 25px rgba(0,255,136,0.5); }
      100% { box-shadow: 0 0 10px rgba(0,255,136,0.2); }
    }

    .login-box {
      animation: glow 4s infinite ease-in-out;
    }

/* ---------- MOBILE FIX ---------- */
@media (max-width: 600px) {

  body {
    padding: 16px; /* prevents edge sticking */
  }

  .login-box {
    width: 100%;
    max-width: 420px;   /* allows it to grow bigger than before */
    padding: 28px 20px;
    border-radius: 14px;
  }

  .login-box h2 {
    font-size: 20px;
    margin-bottom: 20px;
  }

  .input-group {
    margin-bottom: 20px;
  }

  .input-group input {
    padding: 14px;       /* bigger touch target */
    font-size: 15px;
  }

  button {
    padding: 14px;
    font-size: 15px;
  }

  .footer {
    font-size: 11px;
  }
}

/* ---------- EXTRA SMALL PHONES ---------- */
@media (max-width: 400px) {

  .login-box {
    padding: 24px 16px;
  }

  .login-box h2 {
    font-size: 18px;
  }

}

.input-group input:not(:placeholder-shown) + label {
  top: -8px;
  font-size: 11px;
  color: #00ff88;
}

/* ---------- FULLSCREEN MOBILE LOGIN ---------- */
@media (max-width: 600px) {

  body {
    padding: 0;
    height: 100vh;
    display: block;
  }

  .login-box {
    width: 100vw;
    height: 100vh;

    max-width: none;

    border-radius: 0;

    display: flex;
    flex-direction: column;
    justify-content: center;

    padding: 30px 20px;

    box-shadow: none;
    border: none;
  }

  .login-box h2 {
    font-size: 24px;
    margin-bottom: 30px;
  }

  .input-group input {
    padding: 16px;
    font-size: 16px;
  }

  button {
    padding: 16px;
    font-size: 16px;
  }
}
  </style>
</head>
<body>

<div class="login-box">
  <h2>Secure Login</h2>

  <form method="POST">
    <div class="input-group">
      <input name="username" required>
      <label>Username</label>
    </div>

    <div class="input-group">
      <input name="password" type="password" required>
      <label>Password</label>
    </div>

    <button type="submit">Login</button>
  </form>

  <div class="footer">Authorized access only</div>
</div>

</body>
</html>
